<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scale-2 Batch Report</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, Helvetica, sans-serif; font-size: 11px; color: #000; background: #fff; }
.page { max-width: 850px; margin: 0 auto; padding: 24px 36px; }

/* ── Report Header ── */
.report-header { margin-bottom: 6px; }
.report-header table { width: 100%; border-collapse: collapse; }
.report-header td { padding: 1px 4px; vertical-align: top; font-size: 11px; }
.report-header .lbl { font-weight: bold; white-space: nowrap; }
.report-header .colon { width: 10px; text-align: center; }
.report-header .gap { width: 40px; }

.report-title {
  text-align: center; font-size: 18px; font-weight: bold;
  margin: 10px 0 18px;
}

/* ── Batch Section ── */
.batch-section { margin-bottom: 18px; page-break-inside: avoid; }

/* Batch info box */
.batch-top { width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 0; }
.batch-top td, .batch-top th {
  border: 1px solid #000; padding: 2px 6px; vertical-align: top;
}
.batch-top .info-lbl { font-weight: bold; white-space: nowrap; width: 100px; }
.batch-top .info-colon { width: 10px; text-align: center; }
.batch-top .time-hdr { font-weight: bold; text-align: center; }
.batch-top .time-val { text-align: center; }

/* ── Materials Table ── */
.mat-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: -1px; }
.mat-table th, .mat-table td {
  border: 1px solid #000; padding: 2px 6px;
}
.mat-table thead th {
  font-weight: bold; text-align: center; font-size: 11px;
}
.mat-table tbody td { text-align: right; }
.mat-table tbody td:nth-child(1) { text-align: center; width: 56px; }
.mat-table tbody td:nth-child(2) { text-align: left; }
.mat-table tfoot td {
  font-weight: bold; text-align: right;
}
.mat-table tfoot td:first-child { text-align: left; }
</style>
</head>
<body>
<div class="page">

  <!-- Report Header (two-column layout) -->
  <div class="report-header">
    <table>
      <tr>
        <td class="lbl">Plant name</td><td class="colon">:</td><td>Coastal Feeds</td>
        <td class="gap"></td>
        <td class="lbl">Date</td><td class="colon">:</td><td>04/03/2026</td>
      </tr>
      <tr>
        <td class="lbl">Location</td><td class="colon">:</td><td>Gudivada</td>
        <td class="gap"></td>
        <td></td><td></td><td></td>
      </tr>
      <tr>
        <td class="lbl">Print Date</td><td class="colon">:</td><td>04/03/2026</td>
        <td class="gap"></td>
        <td></td><td></td><td></td>
      </tr>
    </table>
  </div>

  <div class="report-title">Scale-2 Batch Report</div>

  

</div>
</body>
</html>
