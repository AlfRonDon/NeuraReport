


<meta charset="UTF-8">
<meta>
<title>Pressure Transmitter Report</title>
<style>
  :root {
    --page-margin-v: 22mm;
    --page-margin-h: 20mm;
    --title-color: #1a237e;
    --header-bg: #1a237e;
    --header-text: #ffffff;
    --border-color: #b0b8c8;
    --col-transmitter: 20%;
    --col-location: 30%;
    --col-current-bar: 26%;
    --col-normal-range: 24%;
    --row-gap: 2.5mm;
    --font-size-title: 20pt;
    --font-size-subtitle: 12pt;
    --font-size-table: 9.5pt;
    --font-size-footer: 9pt;
  }

  @page {
    size: A4;
    margin: var(--page-margin-v) var(--page-margin-h);
  }

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    font-family: Arial, Helvetica, sans-serif;
    font-size: var(--font-size-table);
    color: #222222;
    background: #ffffff;
  }

  body {
    padding: var(--page-margin-v) var(--page-margin-h);
    max-width: 210mm;
    margin: 0 auto;
  }

  #report-header {
    text-align: center;
    margin-bottom: 8mm;
  }

  #report-header h1 {
    font-size: var(--font-size-title);
    font-weight: bold;
    color: var(--title-color);
    letter-spacing: 0.01em;
  }

  .section-title {
    font-size: var(--font-size-subtitle);
    font-weight: bold;
    color: var(--title-color);
    margin-bottom: 5mm;
  }

  #data-table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
    font-size: var(--font-size-table);
    margin-bottom: 6mm;
  }

  #data-table colgroup col.col-transmitter { width: var(--col-transmitter); }
  #data-table colgroup col.col-location    { width: var(--col-location); }
  #data-table colgroup col.col-current     { width: var(--col-current-bar); }
  #data-table colgroup col.col-normal      { width: var(--col-normal-range); }

  #data-table thead tr th {
    background-color: var(--header-bg);
    color: var(--header-text);
    font-weight: bold;
    font-size: var(--font-size-table);
    text-align: center;
    padding: 3mm 2.5mm;
    border: 1px solid #ffffff;
  }

  #data-table thead tr th:first-child {
    border-left: 1px solid var(--border-color);
  }
  #data-table thead tr th:last-child {
    border-right: 1px solid var(--border-color);
  }

  #data-table tbody tr td {
    border: 1px solid var(--border-color);
    padding: 3mm 2.5mm;
    text-align: center;
    color: #333333;
    background-color: #ffffff;
    font-variant-numeric: tabular-nums;
  }

  .report-footer {
    font-size: var(--font-size-footer);
    color: #222222;
    line-height: 1.8;
    margin-top: 2mm;
  }
</style>



<div id="report-header">
  <h1>Pressure Transmitter Report</h1>
</div>

<div class="section-title">Process Pressure Monitoring</div>

<table id="data-table">
  <colgroup>
    <col class="col-transmitter">
    <col class="col-location">
    <col class="col-current">
    <col class="col-normal">
  </colgroup>
  <thead>
    <tr>
      <th data-label="transmitter">Transmitter</th>
      <th data-label="location">Location</th>
      <th data-label="current_bar">Current (bar)</th>
      <th data-label="normal_range">Normal Range</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>{row_transmitter_id}</td>
      <td>{row_location}</td>
      <td>{row_current_bar}</td>
      <td>{row_normal_range}</td>
    </tr>
  </tbody>
</table>

<div class="report-footer">
  <div>Alarms Active: {alarm_count}</div>
  <div>Report Generated: {gen_timestamp}</div>
</div>
