


<meta charset="UTF-8">
<title>Consumption Report</title>
<style>
:root {
  --col-sl-w: 12mm;

  --col-error-w: 24mm;
  --col-errorpct-w: 24mm;
}
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
@page {
  size: A4;
  margin: 12mm 15mm;
}
body {
  font-family: Arial, sans-serif;
  font-size: 9pt;
  line-height: 1.2;
  color: #000;
}
#report-header {
  border: 1px solid #000;
  padding: 1.5mm 3mm;
  margin-bottom: 2mm;
}
.header-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 1mm;
  font-size: 9pt;
}
.header-row:last-child {
  margin-bottom: 0;
}
.header-label {
  font-weight: normal;
  display: inline-block;
  min-width: 22mm;
}
.header-value {
  font-weight: normal;
}
.header-right {
  text-align: right;
  white-space: nowrap;
}
h1 {
  text-align: center;
  font-size: 13pt;
  font-weight: bold;
  margin: 2mm 0;
}
.date-recipe-row {
  display: flex;
  justify-content: space-between;
  border: 1px solid #000;
  padding: 1.5mm 3mm;
  margin-bottom: 2mm;
  font-size: 9pt;
}
.date-recipe-row span {
  font-weight: normal;
}
#data-table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
  margin-bottom: 3mm;
  font-variant-numeric: tabular-nums;
}
#data-table th,
#data-table td {
  border: 1px solid #000;
  padding: 1mm 2mm;
  text-align: left;
  vertical-align: middle;
  font-size: 9pt;
}
#data-table th {
  background-color: #fff;
  font-weight: bold;
}
#data-table th[data-label="sl_no"] {
  width: var(--col-sl-w);
  text-align: center;
}
#data-table th[data-label="material_name"] {
  width: var(--col-material-w);
}
#data-table th[data-label="set_wt"] {
  width: var(--col-set-w);
  text-align: right;
}
#data-table th[data-label="ach_wt"] {
  width: var(--col-ach-w);
  text-align: right;
}
#data-table th[data-label="error_kg"] {
  width: var(--col-error-w);
  text-align: right;
}
#data-table th[data-label="error_pct"] {
  width: var(--col-errorpct-w);
  text-align: right;
}
#data-table tbody td:first-child {
  text-align: center;
}
#data-table tbody td:nth-child(3),
#data-table tbody td:nth-child(4),
#data-table tbody td:nth-child(5),
#data-table tbody td:nth-child(6) {
  text-align: right;
}
#data-table tfoot td {
  font-weight: bold;
  text-align: left;
}
#data-table tfoot td:first-child {
  text-align: center;
}
#data-table tfoot td:nth-child(2) {
  text-align: left;
}
#data-table tfoot td:nth-child(3),
#data-table tfoot td:nth-child(4),
#data-table tfoot td:nth-child(5),
#data-table tfoot td:nth-child(6) {
  text-align: right;
}
.footer-info {
  position: fixed;
  bottom: 12mm;
  left: 15mm;
  right: 15mm;
  display: flex;
  justify-content: space-between;
  font-size: 8.5pt;
}
</style>
