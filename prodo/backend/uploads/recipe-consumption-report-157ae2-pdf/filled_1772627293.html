<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Consumption Report</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, Helvetica, sans-serif; font-size: 11px; color: #000; background: #fff; }
.page { max-width: 800px; margin: 0 auto; padding: 24px 36px; }

/* ── Report Header ── */
.report-header { margin-bottom: 4px; }
.report-header table { width: 100%; border-collapse: collapse; }
.report-header td { padding: 1px 4px; vertical-align: top; font-size: 11px; }
.report-header .lbl { font-weight: bold; white-space: nowrap; }
.report-header .colon { width: 10px; text-align: center; }
.report-header .gap { width: 30px; }

.report-title {
  text-align: center; font-size: 18px; font-weight: bold;
  margin: 8px 0 14px;
}

/* ── Batch Section ── */
.batch-section {
  margin-bottom: 16px; page-break-inside: avoid;
  border: 1px solid #000;
}
.batch-hdr {
  padding: 3px 6px; font-weight: bold; font-size: 11px;
  border-bottom: 1px solid #000;
  display: flex; justify-content: space-between;
}
.batch-hdr-left span { margin-right: 24px; }
.batch-hdr-right span { margin-left: 24px; }

/* ── Materials Table ── */
.mat-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.mat-table th, .mat-table td {
  border: 1px solid #000; padding: 3px 6px;
  border-left: 1px solid #000; border-right: 1px solid #000;
}
/* Remove top border on first row since the batch-hdr border-bottom serves as separator */
.mat-table { border-top: none; }
.mat-table thead th {
  font-weight: bold; text-align: center; font-size: 11px;
  border-top: none;
}
.mat-table tbody td { text-align: right; }
.mat-table tbody td:nth-child(1) { text-align: center; width: 56px; }
.mat-table tbody td:nth-child(2) { text-align: left; }
.mat-table tfoot td {
  font-weight: bold; text-align: right;
}
.mat-table tfoot td:first-child { text-align: left; }
/* Prevent double borders with .batch-section outer border */
.mat-table th:first-child, .mat-table td:first-child { border-left: none; }
.mat-table th:last-child, .mat-table td:last-child { border-right: none; }
.mat-table tfoot td { border-bottom: none; }
</style>
</head>
<body>
<div class="page">

  <div class="report-header">
    <table>
      <tr>
        <td class="lbl">Plant name</td><td class="colon">:</td><td>Coastal Feeds</td>
        <td class="gap"></td>
        <td class="lbl">From</td><td class="colon">:</td><td>01/01/2025</td>
      </tr>
      <tr>
        <td class="lbl">Location</td><td class="colon">:</td><td>Gudivada</td>
        <td class="gap"></td>
        <td class="lbl">To</td><td class="colon">:</td><td>31/12/2025</td>
      </tr>
      <tr>
        <td class="lbl">Print Date</td><td class="colon">:</td><td>04/03/2026</td>
        <td class="gap"></td>
        <td class="lbl">Recipe code</td><td class="colon">:</td><td>CF-SHRIMP-2MM</td>
      </tr>
    </table>
  </div>

  <div class="report-title">Consumption report</div>

  

</div>
</body>
</html>
