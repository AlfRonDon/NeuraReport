<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Consumption Report</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, Helvetica, sans-serif; font-size: 11px; color: #000; background: #fff; }
.page { max-width: 850px; margin: 0 auto; padding: 24px 36px; }

/* ── Report Header ── */
.report-header { margin-bottom: 6px; }
.report-header table { width: 100%; border-collapse: collapse; }
.report-header td { padding: 1px 4px; vertical-align: top; font-size: 11px; }
.report-header .lbl { font-weight: bold; white-space: nowrap; }
.report-header .colon { width: 10px; text-align: center; }
.report-header .gap { width: 40px; }

.report-title {
  text-align: center; font-size: 18px; font-weight: bold;
  margin: 10px 0 18px;
}

/* ── Materials Table ── */
.mat-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.mat-table th, .mat-table td {
  border: 1px solid #000; padding: 4px 8px;
}
.mat-table thead th {
  font-weight: bold; text-align: center; font-size: 11px;
}
.mat-table tbody td { text-align: right; }
.mat-table tbody td:nth-child(1) { text-align: center; width: 56px; }
.mat-table tbody td:nth-child(2) { text-align: left; }
.mat-table tfoot td {
  font-weight: bold; text-align: right;
}
.mat-table tfoot td:first-child { text-align: left; }
</style>
</head>
<body>
<div class="page">

  <!-- Report Header (two-column layout) -->
  <div class="report-header">
    <table>
      <tr>
        <td class="lbl">Plant name</td><td class="colon">:</td><td>Coastal Feeds</td>
        <td class="gap"></td>
        <td class="lbl">From</td><td class="colon">:</td><td>01/01/2026</td>
      </tr>
      <tr>
        <td class="lbl">Location</td><td class="colon">:</td><td>Gudivada</td>
        <td class="gap"></td>
        <td class="lbl">To</td><td class="colon">:</td><td>05/03/2026</td>
      </tr>
      <tr>
        <td class="lbl">Print Date</td><td class="colon">:</td><td>05/03/2026</td>
        <td class="gap"></td>
        <td class="lbl">Batch No</td><td class="colon">:</td><td></td>
      </tr>
    </table>
  </div>

  <div class="report-title">Consumption report</div>

  <!-- Materials Table (flat — no batch blocks) -->
  <table class="mat-table">
    <thead>
      <tr>
        <th>Sl. No.</th>
        <th>Material name</th>
        <th>Set. wt(Kg)</th>
        <th>Ach. wt(Kg)</th>
        <th>Error(Kg)</th>
        <th>Error %</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>1</td>
        <td>Fish Oil</td>
        <td>110</td>
        <td>99</td>
        <td>-11</td>
        <td>-10.000</td>
      </tr>
<tr>
        <td>2</td>
        <td>Soya Oil</td>
        <td>110</td>
        <td>99</td>
        <td>-11</td>
        <td>-10.000</td>
      </tr>
<tr>
        <td>3</td>
        <td>Water</td>
        <td>453</td>
        <td>442</td>
        <td>-11</td>
        <td>-2.428</td>
      </tr>
    </tbody>
    <tfoot>
      <tr>
        <td colspan="2">Total</td>
        <td>673</td>
        <td>640</td>
        <td>-33</td>
        <td>-4.903</td>
      </tr>
    </tfoot>
  </table>

</div>
</body>
</html>
